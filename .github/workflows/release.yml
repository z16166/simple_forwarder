name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-release:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: simple_forwarder
            archive_ext: .tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary_name: simple_forwarder
            archive_ext: .tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: simple_forwarder.exe
            archive_ext: .zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary_name: simple_forwarder.exe
            archive_ext: .zip
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: simple_forwarder
            archive_ext: .zip
          - os: macos-latest # compile intel binary from the arm runner
            target: x86_64-apple-darwin
            binary_name: simple_forwarder
            archive_ext: .zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture arm64
            # Noble (24.04) support for DEB822 format (ubuntu.sources)
            if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
              sudo sed -i 's/^URIs: /Architectures: amd64\nURIs: /' /etc/apt/sources.list.d/ubuntu.sources
              printf "Types: deb\nURIs: http://ports.ubuntu.com/ubuntu-ports/\nSuites: $(lsb_release -sc) $(lsb_release -sc)-updates $(lsb_release -sc)-security\nComponents: main restricted universe multiverse\nSigned-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg\nArchitectures: arm64\n" | sudo tee /etc/apt/sources.list.d/arm64.sources
            else
              sudo sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list
              echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -sc) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
              echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -sc)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
              echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -sc)-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
            fi
            sudo apt-get update
            sudo apt-get install -y \
              gcc-aarch64-linux-gnu \
              libayatana-appindicator3-dev:arm64 \
              libgtk-3-dev:arm64 \
              libxdo-dev:arm64 \
              pkg-config
          else
            sudo apt-get update
            sudo apt-get install -y \
              libayatana-appindicator3-dev \
              libgtk-3-dev \
              libxdo-dev \
              pkg-config
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build Release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: 1
          PKG_CONFIG_PATH: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && '/usr/lib/aarch64-linux-gnu/pkgconfig' || '' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archiveName = "simple_forwarder-${{ matrix.target }}${{ matrix.archive_ext }}"
          $binarySrc = "target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          Copy-Item config.yaml config.yaml.example
          Compress-Archive -Path $binarySrc, README.md, config.yaml.example, LICENSE -DestinationPath $archiveName
          echo "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package Artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          ARCHIVE_NAME="simple_forwarder-${{ matrix.target }}${{ matrix.archive_ext }}"
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} .
          cp config.yaml config.yaml.example
          zip $ARCHIVE_NAME ${{ matrix.binary_name }} README.md config.yaml.example LICENSE
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Package Artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          ARCHIVE_NAME="simple_forwarder-${{ matrix.target }}${{ matrix.archive_ext }}"
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} .
          cp config.yaml config.yaml.example
          tar -czvf $ARCHIVE_NAME ${{ matrix.binary_name }} README.md config.yaml.example LICENSE
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: ${{ env.ARCHIVE_NAME }}
